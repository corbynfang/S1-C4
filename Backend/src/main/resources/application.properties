server.port=8000
spring.application.name=S1-C4Database-Backend

# PostgreSQL (Docker: postgres/postgres)
spring.datasource.url=jdbc:postgresql://localhost:5432/s1c4database
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (dialect required for Hibernate 7 when dialect can't be inferred from JDBC metadata)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
